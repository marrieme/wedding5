    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap"
        rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Cormorant Garamond', serif;
            background-color: #2b2b2b;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Kontainer HP — centered di desktop */
        .mobile-container {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            background-color: #1a1a1a;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Photo Background */
        .bg-photo {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('bg1.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 0;
            filter: brightness(0.8) saturate(1.35) contrast(1.05);
        }

        /* Overlay gradien elegan */
        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom,
                    rgba(0, 0, 0, 0.3) 0%,
                    rgba(0, 0, 0, 0.15) 40%,
                    rgba(0, 0, 0, 0.6) 100%);
            z-index: 1;
        }

        /* Area konten utama */
        .content-area {
            position: relative;
            z-index: 3;
            text-align: center;
            width: 100%;
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }

        /* Label "The Wedding Of" */
        .label-atas {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.95em;
            font-weight: 300;
            letter-spacing: 5px;
            color: rgba(255, 255, 255, 0.8);
            text-transform: uppercase;
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.7);
            margin-bottom: 28px;
        }

        /* Nama Mempelai - Vertikal */
        .nama-adam {
            font-family: 'Playfair Display', serif;
            font-size: 3.2em;
            font-weight: 700;
            color: #fff;
            line-height: 1.1;
            text-shadow: 0 2px 15px rgba(0, 0, 0, 0.5);
            margin-bottom: 8px;
        }

        .divider-dan {
            font-family: 'Playfair Display', serif;
            font-size: 1.4em;
            font-style: italic;
            color: #e8c97e;
            margin: 8px 0;
            text-shadow: 0 1px 10px rgba(0, 0, 0, 0.5);
        }

        .nama-marwah {
            font-family: 'Playfair Display', serif;
            font-size: 3.2em;
            font-weight: 700;
            color: #fff;
            line-height: 1.1;
            text-shadow: 0 2px 15px rgba(0, 0, 0, 0.5);
            margin-bottom: 28px;
        }

        /* Garis dekoratif */
        .garis-deko {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            width: 200px;
        }

        .garis-deko span {
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(232, 201, 126, 0.6), transparent);
        }

        .garis-deko svg {
            flex-shrink: 0;
        }

        /* Tanggal */
        .label-tanggal {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.05em;
            font-weight: 400;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.85);
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.6);
            margin-bottom: 40px;
        }

        /* Nama Tamu Undangan */
        .tamu-label {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.78em;
            font-weight: 700;
            letter-spacing: 4px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            text-shadow: 0 1px 6px rgba(0, 0, 0, 0.5);
            margin-bottom: 6px;
        }

        .tamu-nama {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.15em;
            font-weight: 400;
            font-style: normal;
            color: #e8c97e;
            letter-spacing: 1.5px;
            text-shadow: 0 1px 10px rgba(0, 0, 0, 0.6);
            margin-bottom: 28px;
            padding: 8px 20px;
            border: 1px solid rgba(232, 201, 126, 0.25);
            border-radius: 30px;
            background: rgba(232, 201, 126, 0.07);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        /* Tombol Buka Undangan */
        .btn-buka {
            display: inline-block;
            padding: 14px 38px;
            background-color: rgba(255, 255, 255, 0.1);
            color: #fff;
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.35);
            border-radius: 50px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.05em;
            font-weight: 400;
            letter-spacing: 3px;
            text-transform: uppercase;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            transition: all 0.35s ease;
        }

        .btn-buka:hover {
            background-color: rgba(232, 201, 126, 0.2);
            border-color: rgba(232, 201, 126, 0.6);
            color: #e8c97e;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        }
    </style>
</head>

<body>

    <div class="mobile-container">
        <!-- Photo Background -->
        <div class="bg-photo"></div>

        <!-- Overlay Gelap -->
        <div class="video-overlay"></div>

        <div class="content-area">
            <p class="label-atas">The Wedding Of</p>

            <div class="nama-adam">Adam</div>
            <div class="divider-dan">&</div>
            <div class="nama-marwah">Marwah</div>

            <div class="garis-deko">
                <span></span>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="#e8c97e" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z" />
                </svg>
                <span></span>
            </div>

            <p class="label-tanggal">Minggu, 19 Juli 2026</p>

            <p class="tamu-label">Kepada Yth.</p>
            <div class="tamu-nama">Bpk. Heri &amp; Istri</div>

            <a href="wedding.html" id="btn-buka" class="btn-buka">Buka Undangan</a>
        </div>

        <audio id="bg-music" loop preload="auto">
            <source src="song.mp3" type="audio/mpeg">
            <source src="song.mp3" type="audio/ogg">
        </audio>
    </div>

    <script>
        const audio = document.getElementById('bg-music');
        let audioUnlocked = false;
        let audioReady = false;

        // Pulihkan posisi lagu jika ada
        const savedTime = sessionStorage.getItem('bgm_time');
        if (savedTime) {
            audio.currentTime = parseFloat(savedTime);
        }

        // Mulai preload segera
        audio.load();

        function attemptPlay() {
            if (!audioUnlocked) return;
            audio.play().then(() => {
                sessionStorage.setItem('bgm_playing', 'true');
            }).catch(() => { });
        }

        // Tandai audio sudah cukup di-buffer untuk diputar tanpa jeda
        audio.addEventListener('canplaythrough', () => {
            audioReady = true;
            if (audioUnlocked) attemptPlay();
        }, { once: false });

        // Fungsi unlock audio (hanya sekali dibutuhkan)
        function unlockAudio() {
            if (audioUnlocked) return;
            audioUnlocked = true;
            // Trigger audio context unlock di iOS/Safari
            audio.load();
            attemptPlay();
            // Hapus listener setelah audio berhasil diputar
            document.removeEventListener('touchstart', unlockAudio, true);
            document.removeEventListener('touchend', unlockAudio, true);
            document.removeEventListener('click', unlockAudio, true);
        }

        // Coba autoplay langsung (berhasil di Chrome Android)
        audio.play().then(() => {
            audioUnlocked = true;
            sessionStorage.setItem('bgm_playing', 'true');
        }).catch(() => {
            // Diblokir browser — tunggu interaksi pertama user
            document.addEventListener('touchstart', unlockAudio, true);
            document.addEventListener('touchend', unlockAudio, true);
            document.addEventListener('click', unlockAudio, true);
        });

        // Simpan posisi lagu setiap 500ms
        setInterval(() => {
            if (!audio.paused) {
                sessionStorage.setItem('bgm_time', audio.currentTime);
            }
        }, 500);

        // Pause/Resume lagu sesuai status tab
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                audio.pause();
            } else if (sessionStorage.getItem('bgm_playing') === 'true') {
                attemptPlay();
            }
        });

        // Pause saat user keluar/navigasi dari halaman
        window.addEventListener('pagehide', () => {
            audio.pause();
        });

        // Saat klik Buka Undangan, pastikan flag diset true
        document.getElementById('btn-buka').addEventListener('click', () => {
            sessionStorage.setItem('bgm_playing', 'true');
        });
    </script>
</body>

</html>
